name: PR Playground Demo
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check_pr_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact_name: ${{ steps.version.outputs.artifact_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Set PR version
        id: version
        run: |
          BASE_VERSION=$(sed -nE '/Version:/s/.* ([0-9.]+).*/\1/p' woocommerce-paypal-payments.php)
          VERSUFFIX="${GITHUB_RUN_ID}-g$(git rev-parse --short HEAD)"
          PR_VERSION="${BASE_VERSION}-pr${{ github.event.pull_request.number }}-${VERSUFFIX}"
          ARTIFACT_NAME="woocommerce-paypal-payments-${{ github.event.pull_request.number }}-${GITHUB_RUN_ID}"
          echo "version=$PR_VERSION" >> $GITHUB_OUTPUT
          echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

  create_archive:
    needs: check_pr_version
    uses: inpsyde/reusable-workflows/.github/workflows/build-plugin-archive.yml@a9af34f34e95cbe18703198c7e972e97ebcd7473
    with:
      PHP_VERSION: 7.4
      NODE_VERSION: 22
      PLUGIN_MAIN_FILE: ./woocommerce-paypal-payments.php
      PLUGIN_VERSION: ${{ needs.check_pr_version.outputs.version }}
      PLUGIN_FOLDER_NAME: woocommerce-paypal-payments
      ARCHIVE_NAME: ${{ needs.check_pr_version.outputs.artifact_name }}
      COMPILE_ASSETS_ARGS: "-vv --env=root"

  playground_demo:
    needs: [check_pr_version, create_archive]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR with WordPress Playground details
        uses: actions/github-script@v7
        with:
          script: |
            const generatePlaygroundBlueprint = (runId, prNumber, repoOwner, repoName, artifactName, blueprintUrl) => {
              const pluginProxyUrl = `https://playground.wordpress.net/plugin-proxy.php?org=${repoOwner}&repo=${repoName}&workflow=PR%20Playground%20Demo&artifact=${artifactName}&pr=${prNumber}`;

              const steps = [
                {
                  step: 'installPlugin',
                  pluginData: {
                    resource: 'wordpress.org/plugins',
                    slug: 'woocommerce'
                  },
                  options: {
                    activate: true
                  }
                },
                {
                  step: 'installPlugin',
                  pluginZipFile: {
                    resource: 'url',
                    url: pluginProxyUrl,
                  },
                  options: {
                    activate: true,
                  },
                },
                {
                  step: 'setSiteOptions',
                  options: {
                    woocommerce_onboarding_profile: {
                      skipped: true,
                    },
                  },
                },
                {
                  step: 'login',
                  username: 'admin',
                  password: 'password',
                }
              ];

              // Add WooCommerce blueprint import if URL is found in PR description
              if (blueprintUrl) {
                steps.push({
                  step: 'runWpCliCommand',
                  command: `wc blueprint import ${blueprintUrl}`
                });
              }

              return {
                landingPage: '/wp-admin/admin.php?page=wc-settings&tab=checkout&section=ppcp-gateway',
                preferredVersions: {
                  php: '8.0',
                  wp: 'latest',
                },
                phpExtensionBundles: ['kitchen-sink'],
                features: { networking: true },
                steps: steps,
              };
            };

            // Get PR description and search for blueprint.json URLs
            const prData = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const prDescription = prData.data.body || '';

            // Search for blueprint.json URLs in PR description
            // Matches URLs ending with blueprint.json or containing blueprint.json
            const blueprintRegex = /https?:\/\/[^\s]+blueprint\.json/gi;
            const blueprintMatches = prDescription.match(blueprintRegex);
            const blueprintUrl = blueprintMatches ? blueprintMatches[0] : null;

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('🎮 WordPress Playground Demo')
            );

            const blueprint = generatePlaygroundBlueprint(
              context.runId,
              context.issue.number,
              context.repo.owner,
              context.repo.repo,
              '${{ needs.check_pr_version.outputs.artifact_name }}',
              blueprintUrl
            );

            const playgroundUrl = `https://playground.wordpress.net/#${encodeURIComponent(JSON.stringify(blueprint))}`;

            const commentBody = `## 🎮 WordPress Playground Demo

            Test this PR in a live WordPress environment with WooCommerce:

            **🔗 [Launch Demo](${playgroundUrl})**

            ### What's included:
            - ✅ WordPress (latest)
            - ✅ WooCommerce (latest)${blueprintUrl ? ' with imported blueprint configuration' : ''}
            - ✅ PayPal Payments plugin v${{ needs.check_pr_version.outputs.version }} (built from PR)
            ${blueprintUrl ? `- ✅ Custom WooCommerce setup from: ${blueprintUrl}` : ''}

            ### Login credentials:
            - **Username:** \`admin\`
            - **Password:** \`password\`

            ### Plugin Details:
            - **Version:** ${{ needs.check_pr_version.outputs.version }}
            - **PR:** #${{ github.event.pull_request.number }}
            - **Commit:** ${{ github.event.pull_request.head.sha }}
            - **Run ID:** ${context.runId}

            > 💡 The demo environment resets each time you refresh. Perfect for testing!
            > 🔧 This demo uses the fully built plugin with all compiled assets.
            > 📦 Plugin served directly from GitHub Actions artifacts via WordPress Playground proxy.
            ${blueprintUrl ? `\n> 🛍️ WooCommerce configuration imported from blueprint found in PR description.` : `\n> ℹ️ To add custom WooCommerce setup, include a blueprint.json URL in your PR description.`}

            ---
            <sub>🤖 Auto-generated for commit ${{ github.event.pull_request.head.sha }}</sub>`;

            if (botComment) {
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
            }
