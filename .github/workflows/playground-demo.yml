name: PR Playground Demo
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check_pr_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact_name: ${{ steps.version.outputs.artifact_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Set PR version
        id: version
        run: |
          BASE_VERSION=$(sed -nE '/Version:/s/.* ([0-9.]+).*/\1/p' woocommerce-paypal-payments.php)
          VERSUFFIX="${GITHUB_RUN_ID}-g$(git rev-parse --short HEAD)"
          PR_VERSION="${BASE_VERSION}-pr${{ github.event.pull_request.number }}-${VERSUFFIX}"
          ARTIFACT_NAME="woocommerce-paypal-payments-${{ github.event.pull_request.number }}-${GITHUB_RUN_ID}"
          echo "version=$PR_VERSION" >> $GITHUB_OUTPUT
          echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

  playground_demo:
    needs: [check_pr_version]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR with WordPress Playground details
        uses: actions/github-script@v7
        with:
          script: |
            const generatePlaygroundBlueprint = (runId, prNumber, repoOwner, repoName, artifactName) => {
              const pluginProxyUrl = `https://playground.wordpress.net/plugin-proxy.php?org=${repoOwner}&repo=${repoName}&workflow=PR%20Playground%20Demo&artifact=${artifactName}&pr=${prNumber}`;

              return {
                landingPage: '/wp-admin/admin.php?page=wc-settings&tab=checkout&section=ppcp-gateway',
                preferredVersions: {
                  php: '8.0',
                  wp: 'latest',
                },
                phpExtensionBundles: ['kitchen-sink'],
                features: { networking: true },
                steps: [
                  {
                    step: 'installPlugin',
                    pluginData: {
                      resource: 'wordpress.org/plugins',
                      slug: 'woocommerce'
                    },
                    options: {
                      activate: true
                    }
                  },
                  {
                    step: 'installPlugin',
                    pluginData: {
                      resource: 'url',
                      url: githubProxyUrl,
                    },
                    options: {
                      activate: true,
                    },
                  },
                  {
                    step: 'importWxr',
                    file: {
                      resource: 'url',
                      url: 'https://raw.githubusercontent.com/woocommerce/woocommerce/trunk/plugins/woocommerce/sample-data/sample_products.xml'
                    }
                  },
                  {
                    step: 'setSiteOptions',
                    options: {
                      woocommerce_onboarding_profile: {
                        skipped: true,
                      },
                    },
                  },
                  {
                    step: 'runPHP',
                    code: `
                      <?php
                        include 'wordpress/wp-load.php';
                        $shop_page = get_page_by_path('shop');
                        if (!$shop_page) {
                          $shop_id = wp_insert_post(array(
                            'post_title' => 'Shop',
                            'post_content' => '',
                            'post_status' => 'publish',
                            'post_type' => 'page',
                            'post_name' => 'shop'
                          ));
                          update_option('woocommerce_shop_page_id', $shop_id);
                        }
                        flush_rewrite_rules();
                      ?>
                    `
                  },
                  {
                    step: 'login',
                    username: 'admin',
                    password: 'password',
                  },
                ],
              };
            };

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('🎮 WordPress Playground Demo')
            );

            const blueprint = generatePlaygroundBlueprint();

            const playgroundUrl = `https://playground.wordpress.net/#${encodeURI(JSON.stringify(blueprint))}`;

            const commentBody = `## 🎮 WordPress Playground Demo

            Test WooCommerce with sample products in a live environment:

            **🔗 [Launch Demo](${playgroundUrl})**

            ### What's included:
            - ✅ WordPress (latest)
            - ✅ WooCommerce (latest) + Sample Products
            - 🛍️ **Sample Products**: T-shirts, hoodies, accessories, and more

            ### Demo Features:
            - 🏪 **Shop Page**: Browse products at \`/shop/\`
            - 🛒 **Product Catalog**: Variety of WooCommerce sample products
            - ⚙️ **Admin Access**: Full WooCommerce admin capabilities
            - 💡 **Testing Environment**: Perfect for testing integrations

            ### Login credentials:
            - **Username:** \`admin\`
            - **Password:** \`password\`

            ### PR Details:
            - **PR:** #${{ github.event.pull_request.number }}
            - **Commit:** ${{ github.event.pull_request.head.sha }}
            - **Run ID:** ${context.runId}

            > 💡 The demo environment resets each time you refresh. Perfect for testing!
            > 🛒 Sample products loaded from WooCommerce's official sample data.
            > 🎯 Clean WooCommerce environment ready for plugin testing.

            ---
            <sub>🤖 Auto-generated for commit ${{ github.event.pull_request.head.sha }}</sub>`;

            if (botComment) {
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
            }
