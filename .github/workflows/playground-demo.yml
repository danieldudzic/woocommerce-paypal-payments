name: PR Playground Demo
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check_pr_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set PR version
        id: version
        run: |
          BASE_VERSION=$(sed -nE '/Version:/s/.* ([0-9.]+).*/\1/p' woocommerce-paypal-payments.php)
          VERSUFFIX="${GITHUB_RUN_ID}-g$(git rev-parse --short HEAD)"
          PR_VERSION="${BASE_VERSION}-pr${{ github.event.pull_request.number }}-${VERSUFFIX}"
          RELEASE_TAG="playground-pr${{ github.event.pull_request.number }}-${GITHUB_RUN_ID}"
          echo "version=$PR_VERSION" >> $GITHUB_OUTPUT
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT

  create_archive:
    needs: check_pr_version
    uses: inpsyde/reusable-workflows/.github/workflows/build-plugin-archive.yml@a9af34f34e95cbe18703198c7e972e97ebcd7473
    with:
      PHP_VERSION: 7.4
      NODE_VERSION: 22
      PLUGIN_MAIN_FILE: ./woocommerce-paypal-payments.php
      PLUGIN_VERSION: ${{ needs.check_pr_version.outputs.version }}
      PLUGIN_FOLDER_NAME: woocommerce-paypal-payments
      ARCHIVE_NAME: woocommerce-paypal-payments-${{ needs.check_pr_version.outputs.version }}
      COMPILE_ASSETS_ARGS: "-vv --env=root"

  create_release:
    needs: [check_pr_version, create_archive]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: woocommerce-paypal-payments-${{ needs.check_pr_version.outputs.version }}
          path: ./plugin-build

      - name: Prepare plugin zip
        run: |
          echo "Contents of plugin-build directory:"
          ls -la ./plugin-build/

          # Find the built plugin zip
          ZIP_FILE=$(find ./plugin-build -name "*.zip" -type f | head -1)
          if [ -f "$ZIP_FILE" ]; then
            echo "Found built plugin zip: $ZIP_FILE"
            cp "$ZIP_FILE" ./woocommerce-paypal-payments.zip
          else
            echo "No zip file found, creating from directory..."
            PLUGIN_DIR=$(find ./plugin-build -name "woocommerce-paypal-payments" -type d | head -1)
            if [ -d "$PLUGIN_DIR" ]; then
              echo "Found plugin directory: $PLUGIN_DIR"
              cd ./plugin-build
              zip -r ../woocommerce-paypal-payments.zip woocommerce-paypal-payments/
              cd ..
            else
              echo "Neither zip nor directory found!"
              exit 1
            fi
          fi

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.check_pr_version.outputs.release_tag }}
          release_name: "Playground Demo - PR #${{ github.event.pull_request.number }}"
          body: |
            🎮 **WordPress Playground Demo Release**

            This is a temporary release created for PR #${{ github.event.pull_request.number }} to enable WordPress Playground demos.

            **Plugin Details:**
            - Version: ${{ needs.check_pr_version.outputs.version }}
            - PR: #${{ github.event.pull_request.number }}
            - Commit: ${{ github.event.pull_request.head.sha }}

            **Usage:**
            This release is automatically used by the WordPress Playground demo link in the PR comments.

            > ⚠️ This is a preview release and will be cleaned up automatically.
          draft: false
          prerelease: true

      - name: Upload Plugin to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./woocommerce-paypal-payments.zip
          asset_name: woocommerce-paypal-payments.zip
          asset_content_type: application/zip

  playground_demo:
    needs: [check_pr_version, create_release]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR with WordPress Playground details
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('🎮 WordPress Playground Demo')
            );

            // Use GitHub-Proxy.com to fetch the release asset
            const pluginUrl = `https://github-proxy.com/proxy/?repo=${context.repo.owner}/${context.repo.repo}&release=${{ needs.check_pr_version.outputs.release_tag }}&asset=woocommerce-paypal-payments.zip`;

            const blueprint = {
              landingPage: '/wp-admin/admin.php?page=wc-settings&tab=checkout&section=ppcp-gateway',
              preferredVersions: {
                php: '8.0',
                wp: 'latest',
              },
              phpExtensionBundles: ['kitchen-sink'],
              features: { networking: true },
              steps: [
                {
                  step: 'installPlugin',
                  pluginData: {
                    resource: 'wordpress.org/plugins',
                    slug: 'woocommerce'
                  },
                  options: {
                    activate: true
                  }
                },
                {
                  step: 'installPlugin',
                  pluginZipFile: {
                    resource: 'url',
                    url: pluginUrl,
                  },
                  options: {
                    activate: true,
                  },
                },
                {
                  step: 'setSiteOptions',
                  options: {
                    woocommerce_onboarding_profile: {
                      skipped: true,
                    },
                  },
                },
                {
                  step: 'login',
                  username: 'admin',
                  password: 'password',
                },
              ],
            };

            const playgroundUrl = `https://playground.wordpress.net/#${JSON.stringify(blueprint)}`;

            const commentBody = `## 🎮 WordPress Playground Demo

            Test this PR in a live WordPress environment with WooCommerce:

            **🔗 [Launch Demo](${playgroundUrl})**

            ### What's included:
            - ✅ WordPress (latest)
            - ✅ WooCommerce (latest)
            - ✅ PayPal Payments plugin v${{ needs.check_pr_version.outputs.version }} (built from PR)

            ### Login credentials:
            - **Username:** \`admin\`
            - **Password:** \`password\`

            ### Plugin Details:
            - **Version:** ${{ needs.check_pr_version.outputs.version }}
            - **Release:** ${{ needs.check_pr_version.outputs.release_tag }}
            - **Commit:** ${{ github.event.pull_request.head.sha }}

            > 💡 The demo environment resets each time you refresh. Perfect for testing!
            > 🔧 This demo uses the fully built plugin with all compiled assets.
            > 📦 Plugin served via GitHub-Proxy.com from release assets.

            ---
            <sub>🤖 Auto-generated for commit ${{ github.event.pull_request.head.sha }}</sub>`;

            if (botComment) {
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
            }
